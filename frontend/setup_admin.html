            background-size: cover;

            background-attachment: fixed;

        body::before {
            content: '';

        label {

        input {
            width: 100%;

            background: linear-gradient(135deg, #dc3545, #c82333);

            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(220, 53, 69, 0.3);
        }
        
        button:hover {
            background: linear-gradient(135deg, #c82333, #bd2130);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.4);
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
        
        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .links {
            margin-top: 20px;
            text-align: center;
        }
        
        .links a {
            color: #dc3545;
            text-decoration: none;
            margin: 0 10px;
            font-size: 14px;
        }
        
        .links a:hover {
            text-decoration: underline;

<body>
    <!-- Professional Header -->
    <div class="header" style="background: none; color: #fff; padding: 2em 0; text-align: center; margin-bottom: 20px;">
        <h1 style="margin: 0; font-size: 2.5em; font-weight: bold; letter-spacing: 1px; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">HOTEL PROCUREMENT</h1>
        <div style="font-size: 1.2em; margin-top: 0.5em; opacity: 0.95; font-weight: 500; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Narok - kenya</div>
        <div style="font-size: 1.1em; margin-top: 0.7em; font-style: italic; letter-spacing: 0.5px; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Professional vendor Registration System</div>
    </div>

    <div class="container">
        <h1>Setup Admin User</h1>
        
        <div class="info-box">
            <strong>Default Admin Credentials:</strong><br>
            Username: admin<br>
            Password: admin123<br>
            Email: admin@hotel.com<br>
            <small style="color:#0c5460;">Change password after first login</small>
        </div>
        
        <form id="adminForm">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" value="admin" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" value="admin123" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" value="admin@hotel.com" required>
            </div>
            
            <button type="submit">Create Admin User</button>
        </form>
        
        <div id="result" class="result"></div>
        
        <div class="links">
            <a href="index.html">← Back to Login</a>
            <a href="vendors.html">Vendor Portal</a>
        </div>
    </div>

    <script>
        async function addUser(userData) {
            const response = await fetch('../users.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });
            const text = await response.text();
            let data;
            try {
                data = JSON.parse(text);
            } catch (e) {
                console.error('Server returned non-JSON:', text);
                throw new Error('Server returned invalid response. Ensure Apache and PHP are running and access via http://localhost/');
            }
            if (!response.ok) {
                throw new Error(data.error || 'Failed to create user');
            }
            return data;
        }

        document.getElementById('adminForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const email = document.getElementById('email').value.trim();
            
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result';
            resultDiv.textContent = '';
            resultDiv.style.display = 'none';
            
            try {
                const result = await addUser({
                    username: username,
                    password: password,
                    email: email,
                    role: 'admin'
                });
                
                if (result.success) {
                    resultDiv.className = 'result success';
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = `
                        <strong>Admin created successfully!</strong><br>
                        Username: ${username}<br>
                        Password: (hidden)<br>
                        Email: ${email}<br><br>
                        <a href="index.html" style="color: #155724; text-decoration: underline;">Go to Login Page</a>
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.style.display = 'block';
                    resultDiv.textContent = result.error || 'Failed to create admin user';
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.style.display = 'block';
                resultDiv.textContent = 'Error: ' + error.message;
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
